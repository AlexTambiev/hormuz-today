name = "hormuz-today"
main = "worker/index.js"
compatibility_date = "2026-04-22"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[vars]
STATUS_TIMEZONE = "Europe/London"
LOOKBACK_DAYS = "7"
FEED_TIMEOUT_MS = "12000"
ALLOW_PUBLIC_REFRESH = "false"

[triggers]
crons = ["15 * * * *"]

[[kv_namespaces]]
binding = "STATUS_KV"
